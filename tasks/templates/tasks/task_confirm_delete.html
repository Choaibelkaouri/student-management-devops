{% extends "tasks/base.html" %}
{% block title %}Delete Task{% endblock %}
{% block nav_tasks %}active{% endblock %}

{% block content %}
<div class="row justify-content-center" style="min-height:60vh;align-items:center">
    <div class="col-lg-5 col-md-7 col-sm-10">
        <div class="tm-card p-4 p-md-5 text-center">
            <div style="width:64px;height:64px;border-radius:50%;background:var(--tm-danger-light);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem">
                <i class="bi bi-exclamation-triangle" style="font-size:1.5rem;color:var(--tm-danger)"></i>
            </div>
            <h4 style="font-weight:700;color:var(--tm-dark);margin-bottom:.5rem">Delete Task</h4>
            <p style="color:var(--tm-gray-500);font-size:.95rem">
                Are you sure you want to delete <strong style="color:var(--tm-dark)">"{{ task.title }}"</strong>?<br>
                This action cannot be undone.
            </p>
            <form method="POST" class="mt-4">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-3">
                    <a href="{% url 'task_list' %}" class="btn btn-light px-4">Cancel</a>
                    <button type="submit" class="btn btn-danger px-4"><i class="bi bi-trash me-1"></i> Delete</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
